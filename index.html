<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Sky Hopper</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-wrap">
    <canvas id="gameCanvas" width="400" height="650"></canvas>
    <div id="overlay">
      <h1>Sky Hopper</h1>
      <p>Use ← → or A / D to steer.<br/>On mobile, tap left/right side of screen.</p>
      <button id="startBtn">Start Game</button>
    </div>
    <div id="gameOver" class="hidden">
      <h1>Game Over</h1>
      <p id="finalScore"></p>
      <button id="restartBtn">Play Again</button>
    </div>
    <div id="hud">
      <span id="scoreLabel">0</span>
    </div>
  </div>

  <!-- Load order matters: input/platforms/player before main -->
  <script src="src/input.js"></script>
  <script src="src/platforms.js"></script>
  <script src="src/player.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
